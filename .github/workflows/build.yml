name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: casemind_front
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 14
        uses: actions/setup-node@v4
        with:
          node-version: 14
          cache: npm
          cache-dependency-path: casemind_front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: casemind_front/dist

  backend:
    name: Backend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: casemind_backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Temurin JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8
          cache: maven

      - name: Build backend
        run: mvn -B clean package -Dmaven.test.skip=true

  docker-frontend:
    name: Frontend Docker Build
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: casemind_front/dist

      - name: Build frontend image
        run: docker build -f docker/frontend.Dockerfile -t kcase-frontend:ci .

  docker-backend:
    name: Backend Docker Build
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f docker/Dockerfile -t kcase-backend:ci .
