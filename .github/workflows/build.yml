name: Build

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: casemind_front
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 14
        uses: actions/setup-node@v4
        with:
          node-version: 14
          cache: npm
          cache-dependency-path: casemind_front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Commit frontend dist
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
        working-directory: .
        run: |
          git add casemind_front/dist
          if git diff --cached --quiet; then
            echo "No dist changes to commit"
            exit 0
          fi
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "chore: update frontend dist [skip ci]"
          git push

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: casemind_front/dist

  backend:
    name: Backend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: casemind_backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Temurin JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8
          cache: maven

      - name: Build backend
        run: mvn -B clean package -Dmaven.test.skip=true

  docker-frontend:
    name: Frontend Docker Build
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: casemind_front/dist

      - name: Build frontend image
        run: docker build -f docker/frontend.Dockerfile -t kcase-frontend:ci .

  docker-backend:
    name: Backend Docker Build
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f docker/Dockerfile -t kcase-backend:ci .
